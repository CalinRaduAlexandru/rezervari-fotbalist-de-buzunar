<html lang="ro">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Căutare locuri</title>

<style>

body{
font-family:system-ui;
background:url("background.png") top center no-repeat;
background-size:cover;
min-height:100vh;
margin:0;
color:white;
overflow-x:hidden;
}

/* SEARCH */

.searchWrapper{
position:fixed;
top:85%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
display:flex;
justify-content:center;
z-index:10;
}

.searchBox{
position:relative;
width:500px;
max-width:500px;
}

.inputWrapper{
position:relative;
width:100%;
}

input{
width:100%;
padding:18px;
border-radius:14px;
border:none;
font-size:18px;
outline:none;
box-shadow:0 15px 40px rgba(0,0,0,.4);
}

#clearBtn{
position:absolute;
right:-15px;
top:50%;
transform:translateY(-50%);
font-size:20px;
cursor:pointer;
color:#555;
opacity:0;
transition:opacity .2s;
font-weight:700;
}

.inputWrapper.active #clearBtn{
opacity:.6;
}

.results{
position:absolute;
bottom:120%;
width:105%;
background:#F9FFFC;
color:black;
border-radius:12px;
overflow:hidden;
max-height:260px;
overflow-y:auto;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.resultItem{
padding:14px;
cursor:pointer;
}

.resultItem:hover{
background:#eee;
}

.output{
display:none;
position:fixed;
bottom:25%;
left:0;
right:0;
margin:auto;
width:80vw;
max-width:900px;
text-align:center;
padding:35px;
background:rgba(30,60,90,.55);
border-radius:20px;
backdrop-filter:blur(8px);
font-size:20px;
}

.seat{
display:inline-block;
padding:10px 16px;
margin:8px;
border-radius:10px;
background:rgba(255,255,255,.2);
}

/* PINK PAGE */

#pinkPage{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#173765;
transform:translateX(100%);
transition:transform .45s cubic-bezier(.4,0,.2,1);
z-index:50;
display:flex;
flex-direction:column;
overflow-y:auto;
}

#pinkPage.active{
transform:translateX(0);
}

/* STAGE */

#scene{
width:100%;
display:flex;
justify-content:center;
padding-top:0px;
margin-bottom:25px;
}

.stage{
width:80%;
max-width:500px;
height:60px;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
border-radius:0 0 40px 40px;
font-weight:700;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

/* SEAT MAP */

#seatMap{
width:100%;
display:flex;
flex-direction:column;
gap:16px;
padding:10px;
box-sizing:border-box;
align-items:center;
}

.row{
display:grid;
grid-template-columns:45px 1fr;
align-items:center;
gap:10px;
width:100%;
}

.rowLabel{
width:45px;
text-align:right;
font-weight:600;
}

.seats{
display:flex;
gap:6px;
width:auto;
justify-self:center;
}

.splitSeats{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
width:auto;
justify-self:center;
}

.seatHalf{
display:flex;
gap:6px;
flex:0 0 auto;
min-width:0;
}

.seatHalf.left{
justify-content:flex-end;
}

.seatHalf.right{
justify-content:flex-start;
}

.middleAisle{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
}

.square{
display:flex;
align-items:center;
justify-content:center;
background:white;
opacity:.25;
border-radius:6px;
font-weight:600;
color:black;
aspect-ratio:1/1;
}

.square.active{
background:#DBEAF2;
opacity:1;
box-shadow:0 0 10px rgba(0,255,213,.7);
}

/* MOBILE */

@media(max-width:786px){

.searchBox{
width:80%;
}

.output{
width:80%;
}

}

</style>
</head>

const search=document.getElementById("search")
const results=document.getElementById("results")
const output=document.getElementById("output")
const clearBtn=document.getElementById("clearBtn")
const wrapper=document.querySelector(".inputWrapper")
const pinkPage=document.getElementById("pinkPage")
const seatMap=document.getElementById("seatMap")

const searchableData=data.filter(d=>d.row!==1 && d.name.trim()!=="")

const participants=[...new Set(searchableData.map(d=>`${d.name}|||${(d.email||"").toLowerCase()}`))]
  .map(entry=>{
    const [name,email]=entry.split("|||")
    return {name,email}
  })

function getSeatSize(){

let rows=[...new Set(data.map(d=>d.row))]
let maxSeats=0

rows.forEach(r=>{
let count=data.filter(d=>d.row===r).length
if(count>maxSeats) maxSeats=count
})

let containerWidth=Math.min(window.innerWidth-120,900)
let gap=6

return (containerWidth-(gap*(maxSeats-1)))/maxSeats
}

function buildSeatMap(activeSeats=[]){

seatMap.innerHTML=""

let seatSize=getSeatSize()

let rows=[...new Set(data.map(d=>d.row))].sort((a,b)=>a-b)

rows.forEach(r=>{

let rowDiv=document.createElement("div")
rowDiv.className="row"

let seats=data
  .filter(d=>d.row===r)
  .sort((a,b)=>a.seat-b.seat)

const buildSeatBox=(seat)=>{
  let sq=document.createElement("div")
  sq.className="square"
  sq.style.width=seatSize+"px"
  if(activeSeats.includes(seat.id)){
    sq.classList.add("active")
    sq.textContent=seat.seat
  }
  return sq
}

if(r>=6 && r<=14){

let label=document.createElement("div")
label.className="rowLabel"
label.textContent="R"+r
rowDiv.appendChild(label)

let splitContainer=document.createElement("div")
splitContainer.className="splitSeats"

let left=document.createElement("div")
left.className="seatHalf left"

let right=document.createElement("div")
right.className="seatHalf right"

let middleAisle=document.createElement("div")
middleAisle.className="middleAisle"

middleAisle.style.width="52px"

let leftCount=Math.floor(seats.length/2)
seats.slice(0,leftCount).forEach(s=>left.appendChild(buildSeatBox(s)))
seats.slice(leftCount).forEach(s=>right.appendChild(buildSeatBox(s)))

splitContainer.appendChild(left)
splitContainer.appendChild(middleAisle)
splitContainer.appendChild(right)

rowDiv.appendChild(splitContainer)
seatMap.appendChild(rowDiv)
  return
}

if(r===15){
  rowDiv.style.marginTop="32px"
}

let label=document.createElement("div")
label.className="rowLabel"
label.textContent="R"+r
rowDiv.appendChild(label)

let seatsContainer=document.createElement("div")
seatsContainer.className="seats"

seats.forEach(s=>seatsContainer.appendChild(buildSeatBox(s)))

rowDiv.appendChild(seatsContainer)
seatMap.appendChild(rowDiv)

})

}

buildSeatMap()

window.addEventListener("resize",()=>buildSeatMap())

search.addEventListener("input",()=>{

let val=search.value.trim().toLowerCase()

wrapper.classList.toggle("active",search.value.length>0)

results.innerHTML=""

if(!val){
results.style.display="none"
output.style.display="none"
return
}

let filtered=participants.filter(p=>
  p.name.toLowerCase().includes(val) || p.email.includes(val)
)

if(filtered.length===0){
results.style.display="none"
return
}

results.style.display="block"

filtered.forEach(participant=>{

let div=document.createElement("div")
div.className="resultItem"
div.textContent=participant.name

div.onclick=()=>showSeats(participant.name)

results.appendChild(div)

})

})

function showSeats(name){

results.style.display="none"

let seats=searchableData
  .filter(d=>d.name===name)
  .sort((a,b)=>a.row-b.row || a.seat-b.seat)

output.style.display="block"

output.innerHTML=
"<h2>"+name+"</h2>"+
seats.map(s=>`<span class="seat">Rând ${s.row} (Scaun ${s.seat})</span>`).join("")

buildSeatMap(seats.map(s=>s.id))

}

clearBtn.addEventListener("click",()=>{

search.value=""
results.innerHTML=""
results.style.display="none"

output.innerHTML=""
output.style.display="none"

wrapper.classList.remove("active")

buildSeatMap()

})

/* SWIPE */

let startX=0
let endX=0

document.addEventListener("touchstart",e=>{
startX=e.changedTouches[0].screenX
})

document.addEventListener("touchend",e=>{

endX=e.changedTouches[0].screenX
let diff=endX-startX

if(diff<-70){
pinkPage.classList.add("active")
}

if(diff>70){
pinkPage.classList.remove("active")
}

})
